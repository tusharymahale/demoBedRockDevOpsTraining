---
- name: Deploy application on Tomcat (Docker)
  hosts: docker_hosts
  become: yes

  vars:
    artifactory_url: "https://your.jfrog.instance/artifactory/libs-release-local/demo-0.0.1-SNAPSHOT.war"
    artifactory_user: "yourUser"
    artifactory_password: "yourPassword"
    war_file: demo-0.0.1-SNAPSHOT.war
    docker_image: tomcat:9-jdk11
    container_name: tomcat9_demo

  tasks:
    - name: Ensure Docker is installed
      package:
        name: docker.io
        state: present

    - name: Pull Tomcat image
      docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Download WAR from JFrog
      get_url:
        url: "{{ artifactory_url }}"
        dest: "/tmp/{{ war_file }}"
        url_username: "{{ artifactory_user }}"
        url_password: "{{ artifactory_password }}"
        force_basic_auth: yes

    - name: Stop and remove old container if exists
      docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Run Tomcat container with WAR deployed
      docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        ports:
          - "8080:8080"
        volumes:
          - "/tmp/{{ war_file }}:/usr/local/tomcat/webapps/ROOT.war"
