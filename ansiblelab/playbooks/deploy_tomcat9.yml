---
- name: Install Tomcat 9 and deploy WAR from Artifactory
  hosts: tomcat_servers
  become: yes
  vars:
    tomcat_home: /opt/tomcat9
    tomcat_version: 9.0.89
    tomcat_port: 11011
    war_file: demo-0.0.1-SNAPSHOT.war
    artifactory_url: "http://localhost:8082/artifactory/libs-release-local/com/example/demo/0.0.1-SNAPSHOT/demo-0.0.1-SNAPSHOT.war"
    artifactory_user: admin
    artifactory_password: adminadmin
    war_dest: "{{ tomcat_home }}/webapps/{{ war_file }}"

  tasks:
    - name: Ensure Java is installed
      package:
        name: openjdk-11-jdk
        state: present

    - name: Download and extract Tomcat 9
      unarchive:
        src: "https://downloads.apache.org/tomcat/tomcat-9/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: /opt/
        remote_src: yes
      when: not (tomcat_home is directory)

    - name: Symlink Tomcat home
      file:
        src: "/opt/apache-tomcat-{{ tomcat_version }}"
        dest: "{{ tomcat_home }}"
        state: link
      when: not (tomcat_home is directory)

    - name: Update Tomcat HTTP connector port
      lineinfile:
        path: "{{ tomcat_home }}/conf/server.xml"
        regexp: '(<Connector port=")[0-9]+(" protocol="HTTP/1.1")'
        line: '<Connector port="{{ tomcat_port }}" protocol="HTTP/1.1" connectionTimeout="20000" redirectPort="8443" />'

    - name: Stop Tomcat if running
      shell: "{{ tomcat_home }}/bin/shutdown.sh"
      ignore_errors: yes

    - name: Remove old WAR and exploded directory
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ war_dest }}"
        - "{{ tomcat_home }}/webapps/{{ war_file | regex_replace('\\.war$', '') }}"

    - name: Download WAR from Artifactory
      get_url:
        url: "{{ artifactory_url }}"
        dest: "{{ war_dest }}"
        url_username: "{{ artifactory_user }}"
        url_password: "{{ artifactory_password }}"
        mode: '0644'

    - name: Start Tomcat
      shell: "{{ tomcat_home }}/bin/startup.sh"
      args:
        chdir: "{{ tomcat_home }}/bin"
